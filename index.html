<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Kelola Login CRUD</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    background:#f3f4f6;
    color:#1f2937;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

header{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
    border-bottom:1px solid #e5e7eb;
    padding-bottom:20px;
}

h1{
    font-size:28px;
}

.subtitle{
    color:#6b7280;
    margin-top:5px;
}

.btn{
    border:none;
    border-radius:8px;
    cursor:pointer;
    padding:10px 18px;
    font-size:14px;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-primary:hover{
    background:#1d4ed8;
}

.btn-secondary{
    background:white;
    border:1px solid #d1d5db;
}

.search-box{
    margin-bottom:20px;
}

.form-control{
    width:100%;
    padding:10px;
    border:1px solid #d1d5db;
    border-radius:8px;
}

.table-responsive{
    background:white;
    border-radius:12px;
    overflow-x:auto;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
}

th,td{
    padding:15px;
    border-bottom:1px solid #e5e7eb;
}

th{
    background:#f9fafb;
    text-transform:uppercase;
    font-size:12px;
}

.badge{
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
}

.badge-admin{
    background:#fee2e2;
    color:#b91c1c;
}

.badge-user{
    background:#dcfce7;
    color:#15803d;
}

.badge-editor{
    background:#fef3c7;
    color:#92400e;
}

.btn-link{
    border:none;
    background:none;
    cursor:pointer;
    font-size:14px;
    margin-right:10px;
}

.btn-edit{
    color:#2563eb;
}

.btn-delete{
    color:#dc2626;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.modal.active{
    display:flex;
}

.modal-content{
    background:white;
    width:100%;
    max-width:450px;
    border-radius:12px;
    overflow:hidden;
}

.modal-header{
    padding:15px 20px;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
}

.modal-close{
    border:none;
    background:none;
    font-size:24px;
    cursor:pointer;
}

form{
    padding:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:13px;
    font-weight:bold;
}

.modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
}

.text-center{
    text-align:center;
    color:#9ca3af;
}

@media(max-width:640px){
    .btn{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

<header>
    <div>
        <h1>Manajemen Pengguna</h1>
        <div class="subtitle">
            Kelola data login, email, password dan role user.
        </div>
    </div>

    <button id="btn-open-modal" class="btn btn-primary">
        + Tambah User Baru
    </button>
</header>

<div class="search-box">
    <input
        type="text"
        id="search-user"
        class="form-control"
        placeholder="Cari username...">
</div>

<div class="table-responsive">

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Password</th>
    <th>Role</th>
    <th>Aksi</th>
</tr>
</thead>

<tbody id="user-table-body"></tbody>

</table>

</div>

</div>

<div id="user-modal" class="modal">

<div class="modal-content">

<div class="modal-header">
    <h3 id="modal-title">Tambah User</h3>
    <button id="btn-close-modal" class="modal-close">
        ×
    </button>
</div>

<form id="user-form">

<input type="hidden" id="form-user-id">

<div class="form-group">
<label>Username</label>
<input
type="text"
id="form-username"
class="form-control"
required>
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="form-email"
class="form-control"
required>
</div>

<div class="form-group">
<label>Password</label>
<input
type="password"
id="form-password"
class="form-control"
required>
</div>

<div class="form-group">
<label>Role</label>
<select
id="form-role"
class="form-control">

<option>User</option>
<option>Admin</option>
<option>Editor</option>

</select>
</div>

<div class="modal-footer">
<button
type="button"
id="btn-cancel-modal"
class="btn btn-secondary">
Batal
</button>

<button
type="submit"
class="btn btn-primary">
Simpan
</button>
</div>

</form>

</div>

</div>

<script>

const UserService = {

API_URL:"./users.json",

async initData(){

if(!localStorage.getItem("vanilla_users")){

try{

const response =
await fetch(this.API_URL);

const data =
await response.json();

localStorage.setItem(
"vanilla_users",
JSON.stringify(data)
);

}catch{

localStorage.setItem(
"vanilla_users",
JSON.stringify([])
);

}

}

},

getAll(){

return JSON.parse(
localStorage.getItem("vanilla_users")
) || [];

},

getById(id){

return this.getAll().find(
user => user.id === parseInt(id)
);

},

save(user){

const users = this.getAll();

const duplicateEmail = users.find(
u =>
u.email === user.email &&
u.id !== parseInt(user.id)
);

if(duplicateEmail){

alert("Email sudah digunakan!");
return false;

}

if(user.id){

const index =
users.findIndex(
u => u.id === parseInt(user.id)
);

users[index] = {
...users[index],
...user,
id:parseInt(user.id)
};

}else{

user.id =
users.length > 0
?
Math.max(...users.map(
u => u.id
)) + 1
:
1;

users.push(user);

}

localStorage.setItem(
"vanilla_users",
JSON.stringify(users)
);

return true;

},

delete(id){

const users =
this.getAll().filter(
u => u.id !== parseInt(id)
);

localStorage.setItem(
"vanilla_users",
JSON.stringify(users)
);

}

};

const UI = {

tableBody:
document.getElementById("user-table-body"),

modal:
document.getElementById("user-modal"),

form:
document.getElementById("user-form"),

renderTable(users){

if(users.length===0){

this.tableBody.innerHTML=
`
<tr>
<td colspan="6" class="text-center">
Belum ada data user
</td>
</tr>
`;

return;

}

this.tableBody.innerHTML =
users.map(user=>`

<tr>

<td>#${user.id}</td>

<td>${user.username}</td>

<td>${user.email}</td>

<td>${user.password}</td>

<td>
<span class="badge badge-${user.role.toLowerCase()}">
${user.role}
</span>
</td>

<td>

<button
class="btn-link btn-edit"
data-id="${user.id}">
Edit
</button>

<button
class="btn-link btn-delete"
data-id="${user.id}">
Hapus
</button>

</td>

</tr>

`).join("");

},

toggleModal(show=true,title="Tambah User"){

document.getElementById(
"modal-title"
).innerText = title;

if(show){

this.modal.classList.add(
"active"
);

}else{

this.modal.classList.remove(
"active"
);

this.form.reset();

document.getElementById(
"form-user-id"
).value="";

}

},

fillForm(user){

document.getElementById(
"form-user-id"
).value=user.id;

document.getElementById(
"form-username"
).value=user.username;

document.getElementById(
"form-email"
).value=user.email;

document.getElementById(
"form-password"
).value=user.password;

document.getElementById(
"form-role"
).value=user.role;

}

};

async function App(){

await UserService.initData();

const refreshUI = () =>
UI.renderTable(
UserService.getAll()
);

refreshUI();

document
.getElementById(
"btn-open-modal"
)
.addEventListener(
"click",
()=>UI.toggleModal(true)
);

[
"btn-close-modal",
"btn-cancel-modal"
]
.forEach(id=>{

document
.getElementById(id)
.addEventListener(
"click",
()=>UI.toggleModal(false)
);

});

UI.form.addEventListener(
"submit",
e=>{

e.preventDefault();

const userData = {

id:
document.getElementById(
"form-user-id"
).value,

username:
document.getElementById(
"form-username"
).value,

email:
document.getElementById(
"form-email"
).value,

password:
document.getElementById(
"form-password"
).value,

role:
document.getElementById(
"form-role"
).value

};

if(
UserService.save(userData)
){

UI.toggleModal(false);

refreshUI();

}

});

UI.tableBody.addEventListener(
"click",
e=>{

const id =
e.target.dataset.id;

if(!id) return;

if(
e.target.classList.contains(
"btn-edit"
)
){

const user =
UserService.getById(id);

UI.fillForm(user);

UI.toggleModal(
true,
`Edit User: ${user.username}`
);

}

if(
e.target.classList.contains(
"btn-delete"
)
){

if(
confirm(
`Hapus user #${id}?`
)
){

UserService.delete(id);

refreshUI();

}

}

});

document
.getElementById(
"search-user"
)
.addEventListener(
"input",
e=>{

const keyword =
e.target.value.toLowerCase();

const filtered =
UserService.getAll()
.filter(user =>
user.username
.toLowerCase()
.includes(keyword)
);

UI.renderTable(filtered);

});

}

document.addEventListener(
"DOMContentLoaded",
App
);

</script>

</body>
</html>
